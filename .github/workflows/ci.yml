name: CI

# CI topology. See docs/ci.md for the required-vs-advisory matrix, the
# branch-protection guidance, and the opt-in smoke policy.
#
#   - lint   : cargo fmt --check + clippy -D warnings. Fast-failing and parallel
#              so a formatting / lint nit fails in ~1 minute instead of waiting
#              on the slower build+test legs (#15).
#   - rust   : native cargo build + test of the Cargo workspace, plus a
#              Cedar -> manifest.json compile drift check (mirrors `just compile`).
#              Runs across a Rust toolchain matrix: `stable` + the pinned floor
#              from docker/Dockerfile RUST_VERSION (#13).
#   - spark  : native sbt test + assembly of the policast-spark plugin across a
#              Spark version matrix, uploading the assembly jar per version (#13).
#   - smoke  : the *full* docker-compose end-to-end smoke (`just ci-smoke`) plus
#              the Spark governance demo. ADVISORY / opt-in: it only runs on push
#              to main, the nightly schedule, manual dispatch, or a PR carrying
#              the `run-smoke` label (#12). It reuses the `spark` job's assembly
#              artifact instead of rebuilding it with sbt in Docker (#14) and
#              caches Docker layers through the GHA buildx backend (#11).

on:
  push:
    branches: [main]
  pull_request:
    # `labeled` is listed so adding the `run-smoke` opt-in label re-triggers the
    # workflow and lets the gated `smoke` job run (see its `if:` and docs/ci.md).
    # The default types (opened/synchronize/reopened) must be listed explicitly
    # because specifying `types` overrides the defaults.
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Nightly full smoke at 07:00 UTC against the default branch.
    - cron: "0 7 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: fmt + clippy only (#15). Split out of `rust` so a formatting or lint
  # nit fails fast and in parallel with the slower build/test legs.
  #
  # `-D warnings` is intentional and load-bearing: clippy warnings are promoted
  # to hard errors so lint debt cannot accumulate on main. Suppress a specific
  # lint with a justified `#[allow(...)]` at the narrowest scope rather than
  # weakening this global gate.
  # ---------------------------------------------------------------------------
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        # Pinned to the head of the `stable` branch, whose action.yml defaults
        # `toolchain: stable` -- so no explicit toolchain input is needed here.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all features, warnings as errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Rust: build + test the workspace natively (fast, runs on every PR).
  # Matrix (#13): `stable` catches upstream toolchain drift early, while `1.96`
  # is the floor pinned by docker/Dockerfile (RUST_VERSION) — keeping it green
  # proves the image's toolchain still builds the tree. fmt/clippy live in the
  # `lint` job, so this job is purely build + test + manifest drift.
  # ---------------------------------------------------------------------------
  rust:
    name: rust ${{ matrix.rust }} (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.96"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain (${{ matrix.rust }})
        # `master` requires an explicit `toolchain` input (provided below), which
        # the matrix needs anyway to install both `stable` and the `1.96` floor.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Key per toolchain leg so stable and 1.96 don't clobber each other.
          key: ${{ matrix.rust }}

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Test (all features)
        run: cargo test --workspace --all-features

      # Mirror `just compile`: recompile the Cedar policies and fail if the
      # checked-in manifest.json is stale. The manifest is toolchain-independent,
      # so run this drift check once (on the `stable` leg) to avoid duplicate /
      # racy git-diff checks across the matrix.
      - name: Compile Cedar policies -> manifest.json
        if: matrix.rust == 'stable'
        run: ./scripts/compile-policies.sh

      - name: Verify manifest.json is up to date
        if: matrix.rust == 'stable'
        run: git diff --exit-code examples/policies/manifest.json

  # ---------------------------------------------------------------------------
  # Spark: build + test the policast-spark plugin natively (sbt, JDK 17).
  # Matrix (#13) over the supported Spark version(s). Only 4.1.2 is supported
  # today (it matches docker/Dockerfile SPARK_VERSION and the default in
  # policast-spark/build.sbt); add rows as new Spark 4.x lines are validated.
  # SPARK_VERSION is exported so build.sbt resolves spark-* deps for that line,
  # and the assembly jar is uploaded per version for the smoke job to reuse.
  # ---------------------------------------------------------------------------
  spark:
    name: spark ${{ matrix.spark }} (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        spark: ["4.1.2"]
    env:
      SPARK_VERSION: ${{ matrix.spark }}
    defaults:
      run:
        working-directory: policast-spark
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
        with:
          sbt-runner-version: 1.12.4

      - name: Test (Spark ${{ matrix.spark }})
        run: sbt -Dsbt.color=true test

      - name: Assembly (fat jar, Spark ${{ matrix.spark }})
        run: sbt -Dsbt.color=true assembly

      - name: Upload assembly jar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Version-suffixed so each matrix leg uploads a distinct artifact and
          # the smoke job can pull the exact line it runs against.
          name: policast-spark-assembly-${{ matrix.spark }}
          path: policast-spark/target/scala-2.13/policast-spark-assembly-*.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Full docker-compose smoke: `just ci-smoke` (scripts/ci-smoke.sh) + the Spark
  # governance demo. Builds/uses the sidecar/demo/shell/spark images and runs
  # the end-to-end demos, UC OSS, and the uc-full MinIO flow.
  #
  # ADVISORY + opt-in (#12): this job is intentionally NOT run on every PR
  # because the docker builds + external images (Unity Catalog OSS, MinIO) cost
  # ~30-90 minutes. It runs on:
  #   - push to main
  #   - the nightly schedule
  #   - workflow_dispatch (manual)
  #   - a pull_request labeled `run-smoke` (add the label to opt a PR in)
  # See docs/ci.md for the required-vs-advisory rationale + branch protection.
  # ---------------------------------------------------------------------------
  smoke:
    name: full smoke (docker compose)
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-smoke'))
    runs-on: ubuntu-latest
    needs: [lint, rust, spark]
    timeout-minutes: 90
    env:
      # Spark line the docker smoke exercises. Matches docker/Dockerfile's pinned
      # SPARK_VERSION and the artifact uploaded by the `spark` job above.
      SPARK_SMOKE_VERSION: "4.1.2"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0

      # Optional: authenticate to Docker Hub to avoid anonymous pull rate limits
      # and reach the newfrontdocker/unitycatalog image. Skipped automatically
      # when the secrets are not configured.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Reuse the `spark` job's assembly instead of re-running sbt inside Docker
      # (#14). The jar is staged into the build context so the `spark-prebuilt`
      # Dockerfile stage can COPY it (selected via SPARK_JAR_STAGE below).
      - name: Download policast-spark assembly
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: policast-spark-assembly-${{ env.SPARK_SMOKE_VERSION }}
          path: prebuilt-jar

      - name: Stage prebuilt jar into build context
        run: |
          mkdir -p docker/prebuilt
          cp prebuilt-jar/policast-spark-assembly-*.jar \
             docker/prebuilt/policast-spark-assembly.jar
          ls -l docker/prebuilt

      - name: Initialize .env
        run: just init

      # --- Docker layer caching (#11) ----------------------------------------
      # Pre-build every image the smoke needs through buildx with the GHA cache
      # backend (type=gha). Compose `run`/`up` only builds an image when it is
      # absent, so once these tagged images are loaded, ci-smoke.sh performs no
      # uncached docker builds. Each image gets its own cache scope so the legs
      # don't clobber one another.
      - name: Build sidecar image (cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          target: sidecar
          tags: policast-sidecar:local
          load: true
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar

      - name: Build demo image (cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          target: demo
          tags: policast-demo:local
          load: true
          cache-from: type=gha,scope=demo
          cache-to: type=gha,mode=max,scope=demo

      - name: Build shell image (cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          target: shell
          tags: policast-shell:local
          load: true
          cache-from: type=gha,scope=shell
          cache-to: type=gha,mode=max,scope=shell

      # Spark demo image assembled from the PREBUILT jar (#14): selecting the
      # `spark-prebuilt` Dockerfile stage means sbt never runs in Docker here.
      - name: Build spark-demo image from prebuilt jar (cached)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          target: spark-demo
          tags: policast-spark-demo:local
          load: true
          build-args: |
            SPARK_VERSION=${{ env.SPARK_SMOKE_VERSION }}
            SPARK_JAR_STAGE=spark-prebuilt
            POLICAST_SPARK_JAR_PATH=docker/prebuilt/policast-spark-assembly.jar
          cache-from: type=gha,scope=spark-demo
          cache-to: type=gha,mode=max,scope=spark-demo

      # `just ci-smoke` runs `just init` itself and exercises the sidecar,
      # DataFusion demos, UC OSS, and the uc-full MinIO flow. The images above
      # are already loaded, so no rebuilds happen here.
      - name: Run full smoke
        run: just ci-smoke

      # Spark enforcement path, using the prebuilt-jar image built above. The
      # `policast-spark-demo:local` image already exists, so compose reuses it
      # rather than rebuilding (no sbt assembly in Docker).
      - name: Run Spark governance demo
        run: docker compose --profile spark run --rm spark-demo

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs || true
